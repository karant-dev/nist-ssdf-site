site_name: NIST SSDF Documentation
site_description: A text-first, version-controlled static documentation website for the NIST Secure Software Development Framework (SSDF).
site_author: Karan Thakkar
extra:
  generator: false

theme:
  name: material
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
        
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
        
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

# Ensures clean URLs like /po/po-1/ instead of /po/po-1.html
use_directory_urls: true

plugins:
  - search

# We omit the explicitly defined `nav` parameter. By default, MkDocs
# dynamically generates the navigation map based on the docs/ folder hierarchy!
# It will recognize the v1.1 directory automatically.

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

